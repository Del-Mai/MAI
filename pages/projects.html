<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title> MAI - Proyectos</title>
    <link rel="stylesheet" href="../css/layout.css">
</head>

<body>
<header>
     <h1>MAI</h1>
     <p> Usuario</p>
</header>
<div class="layout">
<aside>
    <a href="dashboard.html">Dashboard</a>
    <a href="#" class="active">Proyectos</a>
    <a href="tasks.html">Tareas</a>
    <a href="#">Calendario</a>
    <a href="settings.html">Configuración</a>
</aside>
<main>
    <div class="welcome">
        <h2> Proyectos</h2>
        <p>Aquí puedes administrar todos tus proyectos.</p>
    </div>
<button id="open-project-modal" class="primary-button">
    +Nuevo proyecto
</button>
<div class="overlay hidden">
    <div class="modal">

    <div id="close-project-modal" class="modal-header">
        <h2> Nuevo proyecto</h2>
        <button class="close-modal" type="button">
         ✕
        </button>
    </div>
    <form id="project-form">
       <label for="name">Nombre del proyecto</label>
       <input
           id="name"
           name="name"
           type="text"
           placeholder="Nombre del proyecto"
        >
      <label for="description">Descripción del proyecto</label>
       <textarea
           id="description"
           name="description"
           placeholder="Describe el proyecto"
       ></textarea>
       <label for="subject">Materia</label>
       <input
        id="subject"
        name="subject"
        type="text"
        placeholder="Materia del proyecto"
       >
       <label for="delivery-date">Fecha de entrega</label>
       <input
           id="delivery-date"
           name="delivery-date"
           type="date"
        >
        <label for="status">Estado</label>
            <select id="status" name="status">
            <option value="in-progress">En curso</option>
            <option value="completed">Finalizado</option>
            <option value="paused">Pausado</option>
            </select>
        <div id="cancel-project-modal" class="modal-actions">
        <button class="primary-button" type="button">
          Cancelar
        </button>

        <button class="primary-button" type="submit">
         Guardar proyecto
        </button>
        </div>
    </form>
    </div>
</div>
     
    <div class="search-container">
    <input
        type="text"
        id="search-project"
        placeholder="🔍 Buscar proyecto..."
    >
    </div>

    <div class="projects-list">
       
    </div>
</main>
</div>
<script src="../js/projects.js"></script>
</body>
</html>
