<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title> MAI - Tareas</title>
    <link rel="stylesheet" href="../css/layout.css">
</head>

<body>
<header>
     <h1>MAI</h1>
     <p> Usuario</p>
</header>
<div class="layout">
<aside>
    <a href="dashboard.html">Dashboard</a>
    <a href="projects.html">Proyectos</a>
    <a href="#" class="active">Tareas</a>
    <a href="#">Calendario</a>
    <a href="settings.html">Configuración</a>
</aside>
<main>
    <div class="welcome">
        <h2>Tareas</h2>
        <p>Aquí puedes administrar todas tus tareas.</p>
    </div>
<button id="open-task-modal" class="primary-button">
    +Nueva tarea
</button>
<div class="overlay hidden">
    <div class="modal">

    <div id="close-task-modal" class="modal-header">
        <h2> Nueva tarea</h2>
        <button class="close-modal" type="button">
         ✕
        </button>
    </div>
    <form id="task-form">
       <label for="name">Nombre de la tarea</label>
       <input
           id="name"
           name="name"
           type="text"
           placeholder="Nombre de la tarea"
        >
      <label for="description">Descripción de la tarea</label>
       <textarea
           id="description"
           name="description"
           placeholder="Descripción de la tarea"
       ></textarea>

      <label for="project">Proyecto</label>
      <select id="project" name="project">
      </select>

       <label for="delivery-date">Fecha limite</label>
       <input
           id="delivery-date"
           name="delivery-date"
           type="date"
        >
        <label for="status">Estado</label>
            <select id="status" name="status">
            <option value="pending">Pendiente</option>
            <option value="completed">Completada</option>
            </select>
        <div id="cancel-task-modal" class="modal-actions">
        <button class="primary-button" type="button">
          Cancelar
        </button>

        <button class="primary-button" type="submit">
         Guardar Tarea
        </button>
        </div>
    </form>
    </div>
</div>

    <div class="search-container">
    <input
        type="text"
        id="search-task"
        placeholder="🔍 Buscar tarea..."
    >
    </div>

    <div class="tasks-list">
       
    </div>
</main>
</div>
<script src="../js/tasks.js"></script>
</body>
</html>
