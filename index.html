<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MAI - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-container">

    <h1>MAI</h1>

    <p>Organiza. Planifica. Avanza.</p>

    <form>

        <input
            type="email"
            placeholder="Correo electrónico"
        >

        <input
            type="password"
            placeholder="Contraseña"
        >

        <button type="submit">
            Iniciar sesión
        </button>

    </form>

    <a href="pages/register.html">
        Crear cuenta
    </a>

</div>

</body>
</html>
